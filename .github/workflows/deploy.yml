name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'
          cache-dependency-path: './fenifisc-inscripcion-atletas/package-lock.json'
      - name: Install dependencies
        working-directory: ./fenifisc-inscripcion-atletas
        run: npm ci
      - name: Build
        working-directory: ./fenifisc-inscripcion-atletas
        run: npm run build
      - name: Copy CNAME
        working-directory: ./fenifisc-inscripcion-atletas
        run: cp public/CNAME dist/CNAME || true
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./fenifisc-inscripcion-atletas/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
